<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>絆占い | キズナテレポート</title>
<base href="/" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Zen+Old+Mincho:wght@400;500;600;700&family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Klee+One:wght@400;600&family=Noto+Sans+TC:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/style.css?v=2fb07785d7" />
<link rel="stylesheet" href="/workspace-skins.css" />
</head>
<body>
  <div class="cosmos-bg">
    <div class="nebula nebula-a"></div>
    <div class="nebula nebula-b"></div>
    <div class="nebula nebula-c"></div>
    <canvas id="ambient-stars"></canvas>
  </div>

  <main class="stage" id="stage">
    <header class="stage-head">
      <div class="ornament">✦ ⋆ ˙ ⊹ ˙ ⋆ ✦</div>
      <h1 class="title" data-i18n="ws.title">絆占い</h1>
      <p class="subtitle" id="ws-subtitle" data-i18n="ws.subtitle">― おふたりのご縁を、そっと読み解きます ―</p>
      <div class="mode-switch" id="mode-switch" role="tablist">
        <button class="mode-btn active" data-mode="name" role="tab" data-i18n="ws.mode_name">名前で占う</button>
        <button class="mode-btn" data-mode="zodiac" role="tab" data-i18n="ws.mode_zodiac">星座で占う</button>
        <span class="mode-indicator" id="mode-indicator"></span>
      </div>
    </header>

    <section class="panels">
      <!-- 左：ひとりめ -->
      <div class="panel panel-left">
        <div class="panel-label" data-i18n="ws.label_you">あなた</div>
        <div class="zodiac-display" id="zodiac-left" data-side="left"></div>
        <div class="zodiac-name" id="zodiac-name-left" data-i18n="ws.select_zodiac">星座を選択してください</div>
        <input class="name-input" id="name-left" type="text" maxlength="12" placeholder="あなたのお名前" data-i18n-placeholder="ws.placeholder_you" autocomplete="off" />
        <div class="zodiac-grid" id="grid-left" data-side="left"></div>
      </div>

      <!-- 中央：占うボタン -->
      <div class="center-pillar">
        <div class="link-thread"></div>
        <button class="divine-btn" id="divine-btn">
          <span class="btn-glow"></span>
          <span class="btn-text" data-i18n="ws.btn_divine">鑑定する</span>
          <span class="btn-sub" data-i18n="ws.btn_sub">おふたりの相性</span>
        </button>
        <div class="link-thread"></div>
      </div>

      <!-- 右：ふたりめ -->
      <div class="panel panel-right">
        <div class="panel-label" data-i18n="ws.label_partner">お相手</div>
        <div class="zodiac-display" id="zodiac-right" data-side="right"></div>
        <div class="zodiac-name" id="zodiac-name-right" data-i18n="ws.select_zodiac">星座を選択してください</div>
        <input class="name-input" id="name-right" type="text" maxlength="12" placeholder="お相手のお名前" data-i18n-placeholder="ws.placeholder_partner" autocomplete="off" />
        <div class="zodiac-grid" id="grid-right" data-side="right"></div>
      </div>
    </section>

    <footer class="stage-foot">
      <span id="hint-text" data-i18n="ws.hint_both">おふたりの星座とお名前を入力してください</span>
    </footer>
  </main>

  <!-- ============ 占いの儀式（障眼法アニメーション） ============ -->
  <div class="ritual" id="ritual" aria-hidden="true">
    <canvas id="ritual-canvas"></canvas>

    <!-- 回転する黄道十二宮の輪 -->
    <div class="zodiac-wheel" id="zodiac-wheel">
      <svg viewBox="0 0 600 600" class="wheel-svg">
        <circle cx="300" cy="300" r="270" class="wheel-ring outer" />
        <circle cx="300" cy="300" r="232" class="wheel-ring inner" />
        <circle cx="300" cy="300" r="150" class="wheel-ring core" />
        <g id="wheel-ticks"></g>
        <g id="wheel-glyphs"></g>
      </svg>
    </div>

    <!-- 中央で結ばれるふたつの星座 -->
    <div class="orbit-pair">
      <div class="orbit-body orbit-1" id="orbit-1"></div>
      <div class="orbit-body orbit-2" id="orbit-2"></div>
      <div class="fusion-core" id="fusion-core"></div>
    </div>

    <!-- 進行中のことばと進捗 -->
    <div class="ritual-caption" id="ritual-caption" data-i18n="ws.ritual_phase1">星々がささやきはじめています…</div>
    <div class="ritual-progress"><span id="ritual-progress-bar"></span></div>
  </div>

  <!-- ============ 結果 ============ -->
  <div class="result" id="result" aria-hidden="true">
    <div class="result-inner">
      <div class="result-aura"></div>
      <div class="result-names" id="result-names"></div>
      <div class="result-ring">
        <svg viewBox="0 0 220 220" class="score-ring">
          <circle cx="110" cy="110" r="96" class="ring-track" />
          <circle cx="110" cy="110" r="96" class="ring-fill" id="ring-fill" />
        </svg>
        <div class="score-center">
          <div class="score-num"><span id="score-value">0</span><i>%</i></div>
          <div class="score-label" id="score-label" data-i18n="ws.score_unit">相性</div>
        </div>
      </div>
      <div class="result-verdict" id="result-verdict"></div>
      <div class="result-message" id="result-message"></div>
      <div class="result-aspects" id="result-aspects"></div>
      <button class="again-btn" id="again-btn" data-i18n="ws.btn_again">もう一度鑑定する</button>
    </div>
  </div>

  <script src="/zodiac.js?v=46264ee84d"></script>
  <script src="/script.js?v=8ac2c887a5"></script>
  <script src="/socket.io.min.js"></script>
  <script>
    // Inject workspace context from template
    window.__WS_PATH_TOKEN__ = "{{ workspace.path_token }}";
    window.__WS_ALIAS__ = {{ workspace.alias | tojson }};
    window.__WS_LANG__ = "{{ workspace.lang or 'ja' }}";
  </script>
  <script src="/workspace-client.js"></script>
</body>
</html>
