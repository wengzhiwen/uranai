<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title data-i18n="app.title">絆占いワークスペース管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/static/manager.css"/>
</head>
<body>
  <!-- ── 语言切换 ── -->
  <div class="lang-switch">
    <button class="lang-btn" data-lang="ja">日本語</button>
    <button class="lang-btn" data-lang="zh">中文</button>
  </div>

  <!-- ════════════════════════════════════════════
       Landing: 创建 / 加入工作区
       ════════════════════════════════════════════ -->
  <div class="screen landing-screen" id="landing-screen">
    <div class="landing-card">
      <h1 data-i18n="landing.heading">占いワークスペース</h1>

      <div class="landing-options">
        <button class="landing-opt-btn primary" id="btn-show-create" data-i18n="landing.create_new">新しいワークスペースを作成</button>
        <button class="landing-opt-btn" id="btn-show-join" data-i18n="landing.enter_code">既存のコードで参加</button>
      </div>

      <!-- 创建表单 -->
      <form class="landing-form" id="form-create" style="display:none">
        <p data-i18n="landing.btn_create">作成する</p>
        <button type="submit" class="btn-action" data-i18n="landing.btn_create">作成する</button>
      </form>

      <!-- 加入表单 -->
      <form class="landing-form" id="form-join" style="display:none">
        <label data-i18n="landing.access_code">アクセスコード</label>
        <input type="text" id="input-join-code" maxlength="8" placeholder="--------" autocomplete="off" spellcheck="false"/>
        <button type="submit" class="btn-action" data-i18n="landing.btn_join">参加する</button>
      </form>

      <!-- 创建成功显示 code -->
      <div class="code-reveal" id="code-reveal" style="display:none">
        <p data-i18n="landing.copy_hint">このコードをメモして共有してください</p>
        <div class="code-display">
          <code id="new-code-text"></code>
          <button class="btn-sm" id="btn-copy-code" data-i18n="landing.btn_copy">コピー</button>
        </div>
        <button class="btn-action" id="btn-go-dash" data-i18n="landing.btn_enter_dashboard">ダッシュボードへ</button>
      </div>

      <p class="error-msg" id="landing-error"></p>
    </div>
  </div>

  <!-- ════════════════════════════════════════════
       Dashboard: 工作区管理
       ════════════════════════════════════════════ -->
  <div class="screen dashboard-screen" id="dash-screen" style="display:none">
    <header class="dash-header">
      <h1 data-i18n="dash.alias_label">ワークスペース名</h1>
      <div class="alias-row">
        <input type="text" id="alias-input" maxlength="50" data-i18n-placeholder="dash.alias_placeholder"/>
        <button class="btn-sm" id="btn-save-alias" data-i18n="dash.alias_save">保存</button>
      </div>
      <button class="btn-logout" id="btn-logout" data-i18n="btn_logout">ログアウト</button>
    </header>

    <section class="dash-section url-section">
      <h2 data-i18n="dash.divination_url">占いページURL</h2>
      <div class="url-row">
        <input type="text" id="divination-url" readonly/>
        <button class="btn-sm" id="btn-copy-url" data-i18n="dash.copy_url">コピー</button>
        <a class="btn-sm btn-link" id="btn-open-url" href="#" target="_blank" data-i18n="dash.open_page">開く</a>
      </div>
      <div class="page-status">
        <span data-i18n="dash.page_status">占いページ</span>
        <span class="status-dot" id="page-status-dot"></span>
        <span id="page-status-text" data-i18n="dash.page_disconnected">未接続</span>
      </div>
    </section>

    <section class="dash-section skin-section">
      <h2 data-i18n="skin.heading">ページスキン</h2>
      <div class="skin-grid" id="skin-grid" role="radiogroup"></div>
    </section>

    <section class="dash-section launch-section">
      <h2 data-i18n="launch.heading">占いを実行</h2>
      <form id="launch-form">
        <div class="form-row">
          <label data-i18n="launch.mode_label">モード</label>
          <div class="mode-toggle">
            <button type="button" class="mode-btn active" data-mode="name" data-i18n="launch.mode_name">名前で占う</button>
            <button type="button" class="mode-btn" data-mode="zodiac" data-i18n="launch.mode_zodiac">星座で占う</button>
          </div>
        </div>
        <div class="form-row form-names">
          <div class="form-field">
            <label data-i18n="launch.name_left">名前（左）</label>
            <input type="text" id="launch-name-left" maxlength="12" autocomplete="off"/>
          </div>
          <div class="form-field">
            <label data-i18n="launch.name_right">名前（右）</label>
            <input type="text" id="launch-name-right" maxlength="12" autocomplete="off"/>
          </div>
        </div>
        <div class="form-row form-zodiac" id="zodiac-fields" style="display:none">
          <div class="form-field">
            <label data-i18n="launch.zodiac_left">星座（左）</label>
            <select id="launch-zodiac-left">
              <option value="aries">♈ 牡羊座</option>
              <option value="taurus">♉ 牡牛座</option>
              <option value="gemini">♊ 双子座</option>
              <option value="cancer">♋ 蟹座</option>
              <option value="leo">♌ 獅子座</option>
              <option value="virgo">♍ 乙女座</option>
              <option value="libra">♎ 天秤座</option>
              <option value="scorpio">♏ 蠍座</option>
              <option value="sagittarius">♐ 射手座</option>
              <option value="capricorn">♑ 山羊座</option>
              <option value="aquarius">♒ 水瓶座</option>
              <option value="pisces">♓ 魚座</option>
            </select>
          </div>
          <div class="form-field">
            <label data-i18n="launch.zodiac_right">星座（右）</label>
            <select id="launch-zodiac-right">
              <option value="aries">♈ 牡羊座</option>
              <option value="taurus">♉ 牡牛座</option>
              <option value="gemini">♊ 双子座</option>
              <option value="cancer">♋ 蟹座</option>
              <option value="leo">♌ 獅子座</option>
              <option value="virgo">♍ 乙女座</option>
              <option value="libra">♎ 天秤座</option>
              <option value="scorpio">♏ 蠍座</option>
              <option value="sagittarius">♐ 射手座</option>
              <option value="capricorn">♑ 山羊座</option>
              <option value="aquarius">♒ 水瓶座</option>
              <option value="pisces">♓ 魚座</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <label data-i18n="launch.score_optional">スコア指定（任意）</label>
          <input type="number" id="launch-score" min="0" max="100" data-i18n-placeholder="launch.score_placeholder"/>
        </div>
        <div class="launch-actions">
          <button type="submit" class="btn-action" data-i18n="launch.btn_launch">占いを実行</button>
          <button type="button" id="btn-reset" class="btn-secondary" data-i18n="launch.btn_reset">リセット</button>
        </div>
        <p class="error-msg" id="launch-error"></p>
      </form>
    </section>

    <section class="dash-section records-section">
      <h2 data-i18n="records.heading">最近の占い記録</h2>
      <div class="records-table-wrap" id="records-wrap">
        <p class="empty-hint" data-i18n="records.empty">まだ記録がありません</p>
      </div>
    </section>
  </div>

  <!-- Socket.IO client -->
  <script src="socket.io.min.js"></script>
  <script src="/static/manager.js"></script>
</body>
</html>
